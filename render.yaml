databases:
  - name: fiberhub-db
    plan: free
    databaseName: fiberhub
    user: fiberhub

services:
  - type: web
    name: fiberhub-api
    plan: free
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: API_PREFIX
        value: /api/v1
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: fiberhub-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 30
      - key: VERIFICATION_TOKEN_EXPIRE_HOURS
        value: 24
      - key: PASSWORD_RESET_TOKEN_EXPIRE_HOURS
        value: 1
      - key: REDIS_URL
        value: ""
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET_NAME
        value: fiberhub
      - key: S3_REGION
        value: us-east-1
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        value: noreply@fiberhub.eg
      - key: SMTP_FROM_NAME
        value: FiberHub Egypt
      - key: SMTP_USE_TLS
        value: true
      - key: FRONTEND_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.11
